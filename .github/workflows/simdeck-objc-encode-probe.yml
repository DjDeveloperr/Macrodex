name: SimDeck ObjC Encode Probe

on:
  workflow_dispatch:
    inputs:
      simdeck_ref:
        description: SimDeck ref to test
        required: false
        default: fix/provider-screen-adapter

permissions:
  contents: read

jobs:
  objc-encode:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          latest_xcode="$(python3 - <<'PY'
          import glob, os, re, subprocess
          candidates = []
          for app in glob.glob('/Applications/Xcode*.app'):
              xcodebuild = os.path.join(app, 'Contents/Developer/usr/bin/xcodebuild')
              if not os.path.exists(xcodebuild):
                  continue
              try:
                  output = subprocess.check_output([xcodebuild, '-version'], text=True, stderr=subprocess.DEVNULL)
              except Exception:
                  continue
              match = re.search(r'Xcode\s+(\d+(?:\.\d+)*)', output)
              if match:
                  version = tuple(int(part) for part in match.group(1).split('.'))
                  prerelease = any(term in app.lower() for term in ('beta', 'rc', 'release_candidate'))
                  candidates.append((not prerelease, version, app))
          print(max(candidates)[2] if candidates else '/Applications/Xcode.app')
          PY
          )"
          sudo xcode-select -s "$latest_xcode/Contents/Developer"
          xcodebuild -version

      - name: Clone SimDeck
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ inputs.simdeck_ref }}" https://github.com/NativeScript/SimDeck.git SimDeck
          git -C SimDeck rev-parse HEAD

      - name: Write encode probe
        shell: bash
        run: |
          set -euo pipefail
          cat > ObjCEncodeProbe.m <<'OBJC'
          #import <Foundation/Foundation.h>
          #import <CoreVideo/CoreVideo.h>
          #import "SimDeck/cli/DFPrivateSimulatorDisplayBridge.h"
          #import "SimDeck/cli/XCWH264Encoder.h"

          static void spin(double seconds) {
              NSDate *deadline = [NSDate dateWithTimeIntervalSinceNow:seconds];
              while ([deadline timeIntervalSinceNow] > 0) {
                  @autoreleasepool {
                      [[NSRunLoop mainRunLoop] runMode:NSDefaultRunLoopMode beforeDate:[NSDate dateWithTimeIntervalSinceNow:0.05]];
                  }
              }
          }

          int main(int argc, const char **argv) {
              @autoreleasepool {
                  if (argc < 2) {
                      fprintf(stderr, "usage: ObjCEncodeProbe <udid>\n");
                      return 64;
                  }
                  NSString *udid = [NSString stringWithUTF8String:argv[1]];
                  __block NSUInteger outputs = 0;
                  XCWH264Encoder *encoder = [[XCWH264Encoder alloc] initWithOutputHandler:^(NSData *sampleData,
                                                                                           uint64_t timestampUs,
                                                                                           BOOL isKeyFrame,
                                                                                           NSString *codec,
                                                                                           NSData *decoderConfig,
                                                                                           CGSize dimensions) {
                      (void)timestampUs;
                      (void)decoderConfig;
                      outputs += 1;
                      NSLog(@"ENCODE_OK output=%lu bytes=%lu key=%@ codec=%@ size=%.0fx%.0f",
                            (unsigned long)outputs,
                            (unsigned long)sampleData.length,
                            isKeyFrame ? @"YES" : @"NO",
                            codec ?: @"nil",
                            dimensions.width,
                            dimensions.height);
                  }];

                  NSError *error = nil;
                  NSLog(@"creating bridge for %@", udid);
                  DFPrivateSimulatorDisplayBridge *bridge = [[DFPrivateSimulatorDisplayBridge alloc] initWithUDID:udid attachDisplay:YES error:&error];
                  if (!bridge) {
                      NSLog(@"bridge init failed: %@", error.localizedDescription ?: @"unknown");
                      NSData *log = [NSData dataWithContentsOfFile:@"/tmp/simdeck-private-bridge.log"];
                      if (log) fwrite(log.bytes, 1, log.length, stderr);
                      return 1;
                  }

                  for (int i = 0; i < 200; i++) {
                      spin(0.1);
                      CVPixelBufferRef frame = [bridge copyPixelBuffer];
                      if (frame) {
                          NSLog(@"FRAME_OK iteration=%d size=%zux%zu status=%@ ready=%@",
                                i,
                                CVPixelBufferGetWidth(frame),
                                CVPixelBufferGetHeight(frame),
                                bridge.displayStatus,
                                bridge.isDisplayReady ? @"YES" : @"NO");
                          [encoder requestKeyFrame];
                          for (int j = 0; j < 12; j++) {
                              [encoder encodePixelBuffer:frame];
                              spin(0.1);
                              if (outputs > 0) {
                                  CVPixelBufferRelease(frame);
                                  [bridge disconnect];
                                  [encoder invalidate];
                                  return 0;
                              }
                          }
                          CVPixelBufferRelease(frame);
                      }
                      if (i % 10 == 0) {
                          NSLog(@"waiting iteration=%d status=%@ ready=%@ size=%.0fx%.0f outputs=%lu",
                                i,
                                bridge.displayStatus,
                                bridge.isDisplayReady ? @"YES" : @"NO",
                                bridge.displaySize.width,
                                bridge.displaySize.height,
                                (unsigned long)outputs);
                      }
                  }

                  NSLog(@"ENCODE_TIMEOUT status=%@ ready=%@ size=%.0fx%.0f outputs=%lu",
                        bridge.displayStatus,
                        bridge.isDisplayReady ? @"YES" : @"NO",
                        bridge.displaySize.width,
                        bridge.displaySize.height,
                        (unsigned long)outputs);
                  [bridge disconnect];
                  [encoder invalidate];
                  NSData *log = [NSData dataWithContentsOfFile:@"/tmp/simdeck-private-bridge.log"];
                  if (log) fwrite(log.bytes, 1, log.length, stderr);
                  return 2;
              }
          }
          OBJC

      - name: Compile encode probe
        shell: bash
        run: |
          set -euo pipefail
          clang -fobjc-arc -ObjC \
            ObjCEncodeProbe.m \
            SimDeck/cli/DFPrivateSimulatorDisplayBridge.m \
            SimDeck/cli/XCWH264Encoder.m \
            -framework Foundation -framework AppKit -framework CoreVideo -framework CoreGraphics -framework IOSurface -framework QuartzCore -framework VideoToolbox -framework CoreMedia \
            -o ObjCEncodeProbe

      - name: Boot simulator and run encode probe
        shell: bash
        env:
          SIMDECK_VIDEO_CODEC: h264-software
          NSUnbufferedIO: YES
        run: |
          set -euo pipefail
          exec > >(tee objc-encode-probe.log) 2>&1
          udid="$(xcrun simctl list devices available --json | python3 -c '
          import json, re, sys
          data = json.load(sys.stdin)
          choices = []
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              version = tuple(int(part) for part in re.findall(r"\d+", runtime)[:3]) or (0,)
              for index, device in enumerate(devices):
                  if not device.get("isAvailable"):
                      continue
                  name = device.get("name", "")
                  device_type = device.get("deviceTypeIdentifier", "")
                  if "iPhone" not in name and "iPhone" not in device_type:
                      continue
                  rank = sum(term in name for term in ("Pro", "iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14"))
                  choices.append((version, rank, -index, device["udid"], name, runtime))
          if not choices:
              raise SystemExit("No available iOS iPhone simulator")
          choices.sort(reverse=True)
          _, _, _, udid, name, runtime = choices[0]
          print(f"Selected simulator {name} ({udid}) on {runtime}", file=sys.stderr)
          print(udid)
          ')"
          xcrun simctl shutdown "$udid" || true
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b
          open -a Simulator --args -CurrentDeviceUDID "$udid" || true
          for i in {1..60}; do
            if xcrun simctl io "$udid" screenshot "/tmp/simdeck-encode-$i.png" && [[ -s "/tmp/simdeck-encode-$i.png" ]]; then
              echo "simctl screenshot ok at $i"
              break
            fi
            sleep 1
          done
          ./ObjCEncodeProbe "$udid"

      - name: Upload encode probe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: objc-encode-probe
          path: |
            objc-encode-probe.log
            /tmp/simdeck-private-bridge.log
