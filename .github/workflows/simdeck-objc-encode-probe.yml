name: SimDeck ObjC Encode Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  videotoolbox-encode:
    runs-on: macos-latest
    timeout-minutes: 12
    steps:
      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          latest_xcode="$(python3 - <<'PY'
          import glob, os, re, subprocess
          candidates = []
          for app in glob.glob('/Applications/Xcode*.app'):
              xcodebuild = os.path.join(app, 'Contents/Developer/usr/bin/xcodebuild')
              if not os.path.exists(xcodebuild):
                  continue
              try:
                  output = subprocess.check_output([xcodebuild, '-version'], text=True, stderr=subprocess.DEVNULL)
              except Exception:
                  continue
              match = re.search(r'Xcode\s+(\d+(?:\.\d+)*)', output)
              if match:
                  version = tuple(int(part) for part in match.group(1).split('.'))
                  prerelease = any(term in app.lower() for term in ('beta', 'rc', 'release_candidate'))
                  candidates.append((not prerelease, version, app))
          print(max(candidates)[2] if candidates else '/Applications/Xcode.app')
          PY
          )"
          sudo xcode-select -s "$latest_xcode/Contents/Developer"
          xcodebuild -version

      - name: Write VideoToolbox probe
        shell: bash
        run: |
          set -euo pipefail
          cat > VTEncodeProbe.m <<'OBJC'
          #import <Foundation/Foundation.h>
          #import <CoreMedia/CoreMedia.h>
          #import <CoreVideo/CoreVideo.h>
          #import <IOSurface/IOSurface.h>
          #import <QuartzCore/QuartzCore.h>
          #import <VideoToolbox/VideoToolbox.h>

          @interface EncodeStats : NSObject
          @property(nonatomic) NSUInteger submitted;
          @property(nonatomic) NSUInteger output;
          @property(nonatomic) NSUInteger failures;
          @property(nonatomic) NSUInteger keyframes;
          @property(nonatomic) NSUInteger totalBytes;
          @property(nonatomic) double totalLatencyMs;
          @property(nonatomic) double maxLatencyMs;
          @end
          @implementation EncodeStats
          @end

          static NSString *fourCCString(OSStatus status) {
              UInt32 value = CFSwapInt32HostToBig((UInt32)status);
              char chars[5] = {0};
              memcpy(chars, &value, 4);
              BOOL printable = YES;
              for (int i = 0; i < 4; i++) {
                  if (chars[i] < 32 || chars[i] > 126) printable = NO;
              }
              return printable ? [NSString stringWithFormat:@"%d/%s", (int)status, chars] : [NSString stringWithFormat:@"%d", (int)status];
          }

          static NSDictionary *encoderSpec(BOOL requireHardware) {
              NSMutableDictionary *spec = [NSMutableDictionary dictionary];
              spec[(__bridge NSString *)kVTVideoEncoderSpecification_EnableHardwareAcceleratedVideoEncoder] = @YES;
              if (requireHardware) {
                  spec[(__bridge NSString *)kVTVideoEncoderSpecification_RequireHardwareAcceleratedVideoEncoder] = @YES;
              }
              return spec;
          }

          static void fillPixelBuffer(CVPixelBufferRef pb, NSUInteger frameIndex) {
              CVPixelBufferLockBaseAddress(pb, 0);
              uint8_t *base = CVPixelBufferGetBaseAddress(pb);
              size_t stride = CVPixelBufferGetBytesPerRow(pb);
              size_t width = CVPixelBufferGetWidth(pb);
              size_t height = CVPixelBufferGetHeight(pb);

              IOSurfaceRef surface = CVPixelBufferGetIOSurface(pb);
              if (!base && surface) {
                  IOSurfaceLock(surface, 0, NULL);
                  base = IOSurfaceGetBaseAddress(surface);
                  stride = IOSurfaceGetBytesPerRow(surface);
              }

              if (base) {
                  for (size_t y = 0; y < height; y++) {
                      uint8_t *row = base + (y * stride);
                      for (size_t x = 0; x < width; x++) {
                          uint8_t *px = row + (x * 4);
                          px[0] = (uint8_t)((x + frameIndex * 7) & 0xff);
                          px[1] = (uint8_t)((y + frameIndex * 3) & 0xff);
                          px[2] = (uint8_t)(((x / 8) ^ (y / 8) ^ frameIndex) & 0xff);
                          px[3] = 255;
                      }
                  }
              }

              if (surface) IOSurfaceUnlock(surface, 0, NULL);
              CVPixelBufferUnlockBaseAddress(pb, 0);
          }

          static CVPixelBufferRef makePixelBuffer(int width, int height, BOOL surfaceBacked) {
              NSMutableDictionary *attrs = [@{
                  (__bridge NSString *)kCVPixelBufferPixelFormatTypeKey: @(kCVPixelFormatType_32BGRA),
                  (__bridge NSString *)kCVPixelBufferWidthKey: @(width),
                  (__bridge NSString *)kCVPixelBufferHeightKey: @(height),
                  (__bridge NSString *)kCVPixelBufferBytesPerRowAlignmentKey: @(64),
                  (__bridge NSString *)kCVPixelBufferMetalCompatibilityKey: @YES,
                  (__bridge NSString *)kCVPixelBufferOpenGLCompatibilityKey: @YES
              } mutableCopy];
              if (surfaceBacked) {
                  attrs[(__bridge NSString *)kCVPixelBufferIOSurfacePropertiesKey] = @{};
              }

              CVPixelBufferRef pb = NULL;
              CVReturn status = CVPixelBufferCreate(kCFAllocatorDefault, width, height, kCVPixelFormatType_32BGRA, (__bridge CFDictionaryRef)attrs, &pb);
              if (status != kCVReturnSuccess) {
                  NSLog(@"PIXEL_BUFFER_CREATE status=%d width=%d height=%d surface=%@", status, width, height, surfaceBacked ? @"yes" : @"no");
                  return NULL;
              }
              return pb;
          }

          static void outputCallback(void *outputCallbackRefCon,
                                     void *sourceFrameRefCon,
                                     OSStatus status,
                                     VTEncodeInfoFlags infoFlags,
                                     CMSampleBufferRef sampleBuffer) {
              EncodeStats *stats = (__bridge EncodeStats *)outputCallbackRefCon;
              NSNumber *submittedAt = sourceFrameRefCon ? CFBridgingRelease(sourceFrameRefCon) : nil;
              double start = submittedAt ? submittedAt.doubleValue : CACurrentMediaTime();
              double latencyMs = (CACurrentMediaTime() - start) * 1000.0;
              @synchronized (stats) {
                  if (status != noErr || !sampleBuffer || !CMSampleBufferDataIsReady(sampleBuffer)) {
                      stats.failures += 1;
                      NSLog(@"CALLBACK_FAIL status=%@ flags=%u", fourCCString(status), infoFlags);
                      return;
                  }
                  stats.output += 1;
                  stats.totalLatencyMs += latencyMs;
                  stats.maxLatencyMs = MAX(stats.maxLatencyMs, latencyMs);

                  CFArrayRef attachments = CMSampleBufferGetSampleAttachmentsArray(sampleBuffer, false);
                  BOOL keyframe = YES;
                  if (attachments && CFArrayGetCount(attachments) > 0) {
                      CFDictionaryRef attachment = (CFDictionaryRef)CFArrayGetValueAtIndex(attachments, 0);
                      keyframe = !CFDictionaryContainsKey(attachment, kCMSampleAttachmentKey_NotSync);
                  }
                  if (keyframe) stats.keyframes += 1;

                  CMBlockBufferRef data = CMSampleBufferGetDataBuffer(sampleBuffer);
                  if (data) stats.totalBytes += CMBlockBufferGetDataLength(data);
              }
          }

          static void setProperty(VTCompressionSessionRef session, CFStringRef key, CFTypeRef value, NSString *name) {
              OSStatus status = VTSessionSetProperty(session, key, value);
              if (status != noErr) NSLog(@"SET_PROPERTY_FAIL %@ status=%@", name, fourCCString(status));
          }

          static void runCase(NSString *name, CMVideoCodecType codec, int width, int height, BOOL surfaceBacked, BOOL requireHardware) {
              NSLog(@"CASE_START name=%@ codec=%@ width=%d height=%d surface=%@ requireHardware=%@",
                    name,
                    codec == kCMVideoCodecType_HEVC ? @"hevc" : @"h264",
                    width,
                    height,
                    surfaceBacked ? @"yes" : @"no",
                    requireHardware ? @"yes" : @"no");

              EncodeStats *stats = [EncodeStats new];
              VTCompressionSessionRef session = NULL;
              OSStatus createStatus = VTCompressionSessionCreate(kCFAllocatorDefault,
                                                                 width,
                                                                 height,
                                                                 codec,
                                                                 (__bridge CFDictionaryRef)encoderSpec(requireHardware),
                                                                 NULL,
                                                                 NULL,
                                                                 outputCallback,
                                                                 (__bridge void *)stats,
                                                                 &session);
              NSLog(@"SESSION_CREATE name=%@ status=%@", name, fourCCString(createStatus));
              if (createStatus != noErr || !session) return;

              int fps = 60;
              int frames = 180;
              int64_t bitrate = MIN((int64_t)width * (int64_t)height * 10LL, 45000000LL);
              setProperty(session, kVTCompressionPropertyKey_RealTime, kCFBooleanTrue, @"RealTime");
              setProperty(session, kVTCompressionPropertyKey_AllowFrameReordering, kCFBooleanFalse, @"AllowFrameReordering");
              setProperty(session, kVTCompressionPropertyKey_ExpectedFrameRate, (__bridge CFTypeRef)@(fps), @"ExpectedFrameRate");
              setProperty(session, kVTCompressionPropertyKey_MaxKeyFrameInterval, (__bridge CFTypeRef)@(fps), @"MaxKeyFrameInterval");
              setProperty(session, kVTCompressionPropertyKey_AverageBitRate, (__bridge CFTypeRef)@(bitrate), @"AverageBitRate");
              if (@available(macOS 11.0, *)) {
                  setProperty(session, kVTCompressionPropertyKey_PrioritizeEncodingSpeedOverQuality, kCFBooleanTrue, @"PrioritizeEncodingSpeedOverQuality");
              }
              if (codec == kCMVideoCodecType_HEVC) {
                  setProperty(session, kVTCompressionPropertyKey_ProfileLevel, kVTProfileLevel_HEVC_Main_AutoLevel, @"ProfileLevel");
              } else {
                  setProperty(session, kVTCompressionPropertyKey_ProfileLevel, kVTProfileLevel_H264_High_AutoLevel, @"ProfileLevel");
              }

              OSStatus prepareStatus = VTCompressionSessionPrepareToEncodeFrames(session);
              NSLog(@"SESSION_PREPARE name=%@ status=%@", name, fourCCString(prepareStatus));

              CFTypeRef usingHW = NULL;
              OSStatus hwStatus = VTSessionCopyProperty(session, kVTCompressionPropertyKey_UsingHardwareAcceleratedVideoEncoder, kCFAllocatorDefault, &usingHW);
              NSLog(@"USING_HW name=%@ status=%@ value=%@", name, fourCCString(hwStatus), usingHW ? (__bridge id)usingHW : @"<nil>");
              if (usingHW) CFRelease(usingHW);

              const int bufferCount = 4;
              CVPixelBufferRef buffers[bufferCount];
              BOOL buffersOK = YES;
              for (int i = 0; i < bufferCount; i++) {
                  buffers[i] = makePixelBuffer(width, height, surfaceBacked);
                  if (!buffers[i]) {
                      buffersOK = NO;
                      break;
                  }
                  fillPixelBuffer(buffers[i], (NSUInteger)i * 17);
              }
              if (!buffersOK) {
                  for (int i = 0; i < bufferCount; i++) if (buffers[i]) CVPixelBufferRelease(buffers[i]);
                  VTCompressionSessionInvalidate(session);
                  CFRelease(session);
                  return;
              }

              double start = CACurrentMediaTime();
              for (int i = 0; i < frames; i++) {
                  @autoreleasepool {
                      CVPixelBufferRef pb = buffers[i % bufferCount];
                      CMTime pts = CMTimeMake(i, fps);
                      NSDictionary *frameProps = i == 0 ? @{(__bridge NSString *)kVTEncodeFrameOptionKey_ForceKeyFrame: @YES} : @{};
                      NSNumber *submittedAt = @(CACurrentMediaTime());
                      void *frameRef = (__bridge_retained void *)submittedAt;
                      OSStatus encodeStatus = VTCompressionSessionEncodeFrame(session,
                                                                              pb,
                                                                              pts,
                                                                              kCMTimeInvalid,
                                                                              (__bridge CFDictionaryRef)frameProps,
                                                                              frameRef,
                                                                              NULL);
                      stats.submitted += 1;
                      if (encodeStatus != noErr) {
                          CFRelease(frameRef);
                          stats.failures += 1;
                          NSLog(@"ENCODE_FAIL name=%@ frame=%d status=%@", name, i, fourCCString(encodeStatus));
                      }
                  }
              }
              OSStatus completeStatus = VTCompressionSessionCompleteFrames(session, kCMTimeInvalid);
              double elapsed = CACurrentMediaTime() - start;

              double deadline = CACurrentMediaTime() + 5.0;
              while (CACurrentMediaTime() < deadline) {
                  @synchronized (stats) {
                      if (stats.output + stats.failures >= stats.submitted) break;
                  }
                  [[NSRunLoop currentRunLoop] runMode:NSDefaultRunLoopMode beforeDate:[NSDate dateWithTimeIntervalSinceNow:0.01]];
              }

              @synchronized (stats) {
                  double avgLatency = stats.output ? stats.totalLatencyMs / (double)stats.output : 0.0;
                  double fpsActual = elapsed > 0.0 ? (double)stats.output / elapsed : 0.0;
                  NSLog(@"CASE_RESULT name=%@ complete=%@ submitted=%lu output=%lu failures=%lu keyframes=%lu bytes=%lu elapsedMs=%.1f fps=%.2f avgCallbackMs=%.2f maxCallbackMs=%.2f",
                        name,
                        fourCCString(completeStatus),
                        (unsigned long)stats.submitted,
                        (unsigned long)stats.output,
                        (unsigned long)stats.failures,
                        (unsigned long)stats.keyframes,
                        (unsigned long)stats.totalBytes,
                        elapsed * 1000.0,
                        fpsActual,
                        avgLatency,
                        stats.maxLatencyMs);
              }

              for (int i = 0; i < bufferCount; i++) CVPixelBufferRelease(buffers[i]);
              VTCompressionSessionInvalidate(session);
              CFRelease(session);
          }

          int main(int argc, const char **argv) {
              @autoreleasepool {
                  NSLog(@"VTEncodeProbe start");
                  runCase(@"h264-hw-720p-iosurface", kCMVideoCodecType_H264, 1280, 720, YES, YES);
                  runCase(@"h264-auto-720p-iosurface", kCMVideoCodecType_H264, 1280, 720, YES, NO);
                  runCase(@"hevc-hw-720p-iosurface", kCMVideoCodecType_HEVC, 1280, 720, YES, YES);
                  runCase(@"hevc-auto-720p-iosurface", kCMVideoCodecType_HEVC, 1280, 720, YES, NO);
                  runCase(@"h264-hw-17pro-iosurface", kCMVideoCodecType_H264, 1206, 2622, YES, YES);
                  runCase(@"h264-auto-17pro-iosurface", kCMVideoCodecType_H264, 1206, 2622, YES, NO);
                  runCase(@"hevc-hw-17pro-iosurface", kCMVideoCodecType_HEVC, 1206, 2622, YES, YES);
                  runCase(@"hevc-auto-17pro-iosurface", kCMVideoCodecType_HEVC, 1206, 2622, YES, NO);
                  NSLog(@"VTEncodeProbe done");
              }
              return 0;
          }
          OBJC

      - name: Compile VideoToolbox probe
        shell: bash
        run: |
          set -euo pipefail
          clang -fobjc-arc VTEncodeProbe.m \
            -framework Foundation \
            -framework CoreMedia \
            -framework CoreVideo \
            -framework IOSurface \
            -framework QuartzCore \
            -framework VideoToolbox \
            -o VTEncodeProbe

      - name: Run VideoToolbox probe
        shell: bash
        env:
          NSUnbufferedIO: YES
        run: |
          set -uo pipefail
          exec > >(tee vt-encode-probe.log) 2>&1
          echo "== Host =="
          sw_vers
          uname -a
          sysctl machdep.cpu.brand_string || true
          echo "== Xcode =="
          xcodebuild -version
          echo "== Probe =="
          ./VTEncodeProbe &
          probe_pid=$!
          for i in {1..180}; do
            if ! kill -0 "$probe_pid" 2>/dev/null; then
              wait "$probe_pid"
              status=$?
              echo "VTEncodeProbe exit=$status"
              exit "$status"
            fi
            sleep 1
          done
          echo "VTEncodeProbe timed out after 180s"
          kill -QUIT "$probe_pid" || true
          sleep 2
          kill -TERM "$probe_pid" || true
          wait "$probe_pid" || true
          status=124
          echo "VTEncodeProbe exit=$status"
          exit "$status"

      - name: Upload VideoToolbox probe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vt-encode-probe
          path: |
            vt-encode-probe.log
            ~/Library/Logs/DiagnosticReports/VTEncodeProbe*
