name: SimDeck Provider

on:
  workflow_dispatch:
    inputs:
      preview_id:
        description: SimDeck Studio preview deployment id
        required: true
      provider_token:
        description: One-time provider registration token
        required: true
      simdeck_cloud_url:
        description: SimDeck Studio control plane URL
        required: true
      artifact_id:
        description: GitHub Actions artifact id containing a simulator .app
        required: false
      source_run_id:
        description: Source workflow run id that uploaded the simulator artifact
        required: false
      bundle_id:
        description: iOS app bundle id to launch after install
        required: false
      simdeck_artifact_url:
        description: Optional URL to a prebuilt simdeck binary tarball
        required: false
      simdeck_repository:
        description: GitHub repository to clone when SimDeck is not present in the target repo
        required: false
        default: NativeScript/SimDeck
      simdeck_ref:
        description: Optional SimDeck branch, tag, or SHA to check out
        required: false
      webrtc_ice_servers:
        description: Comma-separated ICE server URLs for browser and provider WebRTC
        required: false
        default: stun:stun.l.google.com:19302
      webrtc_ice_transport_policy:
        description: Browser ICE transport policy
        required: false
        default: all

permissions:
  actions: read
  contents: read

jobs:
  provider:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download simulator artifact
        if: ${{ inputs.artifact_id != '' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ inputs.artifact_id }}
          run-id: ${{ inputs.source_run_id || github.run_id }}
          github-token: ${{ github.token }}
          path: simdeck-artifact

      - name: Install cloudflared
        shell: bash
        run: |
          set -euo pipefail
          brew install cloudflare/cloudflare/cloudflared

      - name: Register provider workflow
        shell: bash
        env:
          SIMDECK_CLOUD_URL: ${{ inputs.simdeck_cloud_url }}
          PREVIEW_ID: ${{ inputs.preview_id }}
          PROVIDER_TOKEN: ${{ inputs.provider_token }}
        run: |
          set -euo pipefail
          curl -fsS \
            -H 'content-type: application/json' \
            -d "{
              \"previewId\":\"$PREVIEW_ID\",
              \"providerToken\":\"$PROVIDER_TOKEN\",
              \"providerRunId\":\"$GITHUB_RUN_ID\",
              \"providerRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",
              \"status\":\"building\",
              \"simulatorName\":\"GitHub Actions macOS runner\"
            }" \
            "$SIMDECK_CLOUD_URL/api/actions/providers/register"

      - name: Build or download SimDeck
        shell: bash
        env:
          SIMDECK_ARTIFACT_URL: ${{ inputs.simdeck_artifact_url }}
          SIMDECK_REPOSITORY: ${{ inputs.simdeck_repository || 'NativeScript/SimDeck' }}
          SIMDECK_REF: ${{ inputs.simdeck_ref }}
        run: |
          set -euo pipefail
          if [[ -n "${SIMDECK_ARTIFACT_URL:-}" ]]; then
            mkdir -p build
            curl -fsSL "$SIMDECK_ARTIFACT_URL" | tar -xz -C build
            chmod +x build/simdeck
          elif [[ -x ./scripts/build-client.sh && -x ./scripts/build-cli.sh ]]; then
            ./scripts/build-client.sh
            ./scripts/build-cli.sh
          else
            simdeck_repo="${SIMDECK_REPOSITORY:-NativeScript/SimDeck}"
            if [[ ! "$simdeck_repo" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
              echo "Invalid SimDeck repository: $simdeck_repo"
              exit 1
            fi
            clone_args=(--depth 1)
            if [[ -n "${SIMDECK_REF:-}" ]]; then
              clone_args+=(--branch "$SIMDECK_REF")
            fi
            git clone "${clone_args[@]}" "https://github.com/$simdeck_repo.git" simdeck-src
            ./simdeck-src/scripts/build-client.sh
            ./simdeck-src/scripts/build-cli.sh
            mkdir -p build
            mkdir -p client
            cp simdeck-src/build/simdeck build/simdeck
            cp simdeck-src/build/simdeck-bin build/simdeck-bin
            rm -rf client/dist
            cp -R simdeck-src/client/dist client/dist
            chmod +x build/simdeck
            chmod +x build/simdeck-bin
          fi

      - name: Start simulator provider
        shell: bash
        env:
          SIMDECK_CLOUD_URL: ${{ inputs.simdeck_cloud_url }}
          PREVIEW_ID: ${{ inputs.preview_id }}
          PROVIDER_TOKEN: ${{ inputs.provider_token }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          SIMDECK_ALLOWED_ORIGINS: ${{ inputs.simdeck_cloud_url }}
          SIMDECK_WEBRTC_ICE_SERVERS: ${{ inputs.webrtc_ice_servers }}
          WEBRTC_ICE_TRANSPORT_POLICY: ${{ inputs.webrtc_ice_transport_policy }}
          RUST_LOG: info,wtransport=warn,quinn=warn
          RUST_BACKTRACE: full
          NSUnbufferedIO: YES
        run: |
          set -euo pipefail
          run_with_timeout() {
            local limit="$1"
            shift
            "$@" &
            local pid="$!"
            local elapsed=0
            while kill -0 "$pid" 2>/dev/null; do
              if (( elapsed >= limit )); then
                kill "$pid" 2>/dev/null || true
                wait "$pid" 2>/dev/null || true
                return 124
              fi
              sleep 1
              elapsed=$((elapsed + 1))
            done
            wait "$pid"
          }

          latest_xcode="$(python3 - <<'PY'
          import glob, os, re, subprocess
          candidates = []
          for app in glob.glob('/Applications/Xcode*.app'):
              xcodebuild = os.path.join(app, 'Contents/Developer/usr/bin/xcodebuild')
              if not os.path.exists(xcodebuild):
                  continue
              try:
                  output = subprocess.check_output([xcodebuild, '-version'], text=True, stderr=subprocess.DEVNULL)
              except Exception:
                  continue
              match = re.search(r'Xcode\s+(\d+(?:\.\d+)*)', output)
              if match:
                  version = tuple(int(part) for part in match.group(1).split('.'))
                  prerelease = any(term in app.lower() for term in ('beta', 'rc', 'release_candidate'))
                  candidates.append((not prerelease, version, app))
          print(max(candidates)[2] if candidates else '/Applications/Xcode.app')
          PY
          )"
          echo "Selecting Xcode at $latest_xcode"
          sudo xcode-select -s "$latest_xcode/Contents/Developer"
          xcodebuild -version
          xcrun simctl list runtimes available

          ios_udid="$(xcrun simctl list devices available --json | python3 -c '
          import json, re, sys
          data = json.load(sys.stdin)
          choices = []
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              version = tuple(int(part) for part in re.findall(r"\d+", runtime)[:3]) or (0,)
              for index, device in enumerate(devices):
                  if not device.get("isAvailable"):
                      continue
                  name = device.get("name", "")
                  device_type = device.get("deviceTypeIdentifier", "")
                  if "iPhone" not in name and "iPhone" not in device_type:
                      continue
                  compact = ("SE", "mini", "16e", "iPhone 8", "iPhone 7")
                  oversized = ("Pro Max", "Plus", "Pro")
                  rank = sum(10 for term in compact if term in name) - sum(3 for term in oversized if term in name)
                  choices.append((version, rank, -index, device["udid"], name, runtime))
          if not choices:
              raise SystemExit("No available iOS iPhone simulator")
          choices.sort(reverse=True)
          _, _, _, udid, name, runtime = choices[0]
          print(f"Selected simulator {name} ({udid}) on {runtime}", file=sys.stderr)
          print(udid)
          ')"

          echo "Booting simulator $ios_udid"
          xcrun simctl shutdown "$ios_udid" || true
          xcrun simctl boot "$ios_udid" || true
          if ! run_with_timeout 180 xcrun simctl bootstatus "$ios_udid" -b; then
            echo "simctl bootstatus timed out"
            xcrun simctl list devices "$ios_udid" || true
            exit 1
          fi
          echo "Simulator bootstatus complete"
          echo "Opening Simulator.app in background"
          /usr/bin/open -g -a Simulator --args -CurrentDeviceUDID "$ios_udid" >/tmp/simdeck-open-simulator.log 2>&1 &
          open_pid="$!"
          for _ in {1..20}; do
            if ! kill -0 "$open_pid" 2>/dev/null; then
              break
            fi
            sleep 0.25
          done
          if kill -0 "$open_pid" 2>/dev/null; then
            echo "Simulator.app launch command is still running; continuing provider startup"
          fi
          screenshot_ready=0
          echo "Waiting for simulator screenshot readiness"
          for _ in {1..60}; do
            if run_with_timeout 5 xcrun simctl io "$ios_udid" screenshot /tmp/simdeck-provider-screen.png >/tmp/simdeck-screenshot.log 2>&1 && [[ -s /tmp/simdeck-provider-screen.png ]]; then
              screenshot_ready=1
              break
            fi
            sleep 1
          done
          if [[ "$screenshot_ready" != "1" ]]; then
            echo "Simulator screenshot did not become ready before provider start"
            cat /tmp/simdeck-screenshot.log || true
          fi

          app_path=""
          if [[ -d simdeck-artifact ]]; then
            app_path="$(find simdeck-artifact -maxdepth 6 -type d -name '*.app' | head -n 1 || true)"
          fi
          if [[ -n "$app_path" ]]; then
            echo "Installing simulator artifact from $app_path"
            run_with_timeout 120 xcrun simctl install "$ios_udid" "$app_path" || echo "simctl install timed out or failed"
          fi
          if [[ -n "${BUNDLE_ID:-}" ]]; then
            echo "Launching $BUNDLE_ID"
            run_with_timeout 30 xcrun simctl launch "$ios_udid" "$BUNDLE_ID" || true
            run_with_timeout 5 xcrun simctl io "$ios_udid" screenshot /tmp/simdeck-provider-app-screen.png >/tmp/simdeck-app-screenshot.log 2>&1 || cat /tmp/simdeck-app-screenshot.log || true
          fi

          echo "Starting SimDeck server"
          ./build/simdeck serve \
            --port 4310 \
            --bind 127.0.0.1 \
            --access-token "$PROVIDER_TOKEN" \
            --client-root "$PWD/client/dist" \
            --video-codec h264-software \
            > simdeck.log 2>&1 &
          simdeck_pid="$!"
          echo "SimDeck server pid: $simdeck_pid"

          dump_logs() {
            echo "--- simdeck.log ---"
            cat simdeck.log || true
            echo "--- private bridge log ---"
            cat /tmp/simdeck-private-bridge.log || true
            echo "--- crash reports ---"
            find "$HOME/Library/Logs/DiagnosticReports" -maxdepth 1 -type f \( -name 'simdeck*.ips' -o -name 'simdeck*.crash' \) -print -exec cat {} \; || true
          }

          healthy=0
          for _ in {1..120}; do
            if ! kill -0 "$simdeck_pid" 2>/dev/null; then
              echo "simdeck exited before health check passed"
              dump_logs
              exit 1
            fi
            if curl -fsS http://127.0.0.1:4310/api/health >/dev/null; then
              healthy=1
              break
            fi
            sleep 1
          done
          if [[ "$healthy" != "1" ]]; then
            echo "simdeck did not become healthy"
            cat simdeck.log || true
            exit 1
          fi

          echo "Prewarming private simulator stream"
          if ! run_with_timeout 60 curl -fsS -X POST "http://127.0.0.1:4310/api/simulators/$ios_udid/refresh?simdeckToken=$PROVIDER_TOKEN"; then
            echo "SimDeck private stream prewarm failed"
            dump_logs
            exit 1
          fi
          echo
          echo "Private simulator stream prewarmed"

          cloudflared tunnel --url http://127.0.0.1:4310 \
            > cloudflared.log 2>&1 &
          cloudflared_pid="$!"

          tunnel_url=""
          for _ in {1..120}; do
            tunnel_url="$(grep -Eo 'https://[-a-zA-Z0-9.]+\.trycloudflare\.com' cloudflared.log | head -n 1 || true)"
            if [[ -n "$tunnel_url" ]]; then
              break
            fi
            sleep 1
          done

          if [[ -z "$tunnel_url" ]]; then
            echo "cloudflared did not print a trycloudflare.com URL"
            cat cloudflared.log || true
            exit 1
          fi

          urlencode() {
            python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$1"
          }
          ice_query="$(urlencode "${SIMDECK_WEBRTC_ICE_SERVERS:-stun:stun.l.google.com:19302}")"
          policy_query="$(urlencode "${WEBRTC_ICE_TRANSPORT_POLICY:-all}")"
          provider_base_url="$tunnel_url/?simdeckToken=$PROVIDER_TOKEN&transport=webrtc&device=$ios_udid&iceServers=$ice_query&iceTransportPolicy=$policy_query"

          (
            while true; do
              sleep 15
              echo "::group::SimDeck diagnostics $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              curl -fsS "http://127.0.0.1:4310/api/metrics" || true
              echo
              echo "--- simdeck webrtc log tail ---"
              grep -E 'WebRTC|ICE|candidate|peer connection|frame write|bootstrap' simdeck.log | tail -n 80 || true
              echo "--- private bridge log tail ---"
              tail -n 80 /tmp/simdeck-private-bridge.log || true
              echo "--- cloudflared log tail ---"
              tail -n 20 cloudflared.log || true
              echo "::endgroup::"
            done
          ) &
          diagnostics_pid="$!"

          register() {
            curl -fsS \
              -H 'content-type: application/json' \
              -d "{
              \"previewId\":\"$PREVIEW_ID\",
              \"providerToken\":\"$PROVIDER_TOKEN\",
              \"providerRunId\":\"$GITHUB_RUN_ID\",
              \"providerRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",
                \"baseUrl\":\"$provider_base_url\",
                \"simulatorUdid\":\"$ios_udid\",
                \"simulatorName\":\"GitHub Actions macOS runner\",
                \"runtimeName\":\"$(xcrun simctl getenv "$ios_udid" SIMULATOR_RUNTIME_VERSION 2>/dev/null || true)\",
                \"status\":\"ready\",
                \"simulatorCount\":1
              }" \
              "$SIMDECK_CLOUD_URL/api/actions/providers/register"
          }

          register
          echo "SimDeck tunnel: $tunnel_url"
          echo "SimDeck WebRTC URL: $provider_base_url"
          deadline=$((SECONDS + 1800))
          while true; do
            sleep 30
            if (( SECONDS >= deadline )); then
              curl -fsS \
                -H 'content-type: application/json' \
                -d "{\"previewId\":\"$PREVIEW_ID\",\"providerToken\":\"$PROVIDER_TOKEN\",\"providerRunId\":\"$GITHUB_RUN_ID\",\"providerRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"status\":\"expired\"}" \
                "$SIMDECK_CLOUD_URL/api/actions/providers/register" || true
              echo "SimDeck provider hard timeout reached"
              exit 0
            fi
            if ! kill -0 "$simdeck_pid" 2>/dev/null; then
              echo "simdeck exited"
              dump_logs
              exit 1
            fi
            if ! kill -0 "$cloudflared_pid" 2>/dev/null; then
              echo "cloudflared exited"
              cat cloudflared.log || true
              exit 1
            fi
            if ! kill -0 "$diagnostics_pid" 2>/dev/null; then
              echo "diagnostics loop exited"
            fi
            register
          done

      - name: Upload SimDeck provider diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simdeck-provider-diagnostics
          path: |
            simdeck.log
            cloudflared.log
            /tmp/simdeck-private-bridge.log
            /tmp/simdeck-open-simulator.log
            /tmp/simdeck-screenshot.log
            /tmp/simdeck-app-screenshot.log
            /tmp/simdeck-provider-screen.png
            /tmp/simdeck-provider-app-screen.png
            ~/Library/Logs/DiagnosticReports/simdeck*.ips
            ~/Library/Logs/DiagnosticReports/simdeck*.crash
