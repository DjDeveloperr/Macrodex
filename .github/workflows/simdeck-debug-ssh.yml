name: SimDeck Debug SSH

on:
  workflow_dispatch:
    inputs:
      simdeck_ref:
        description: SimDeck branch, tag, or SHA to clone for debugging
        required: false
        default: fix/provider-screen-adapter
      prepare_simulator:
        description: Boot and prime the newest available iPhone simulator before opening SSH
        required: false
        type: boolean
        default: true
      build_simdeck:
        description: Build SimDeck before opening SSH (slow, but ready to run)
        required: false
        type: boolean
        default: false
      limit_access_to_actor:
        description: Only allow SSH keys registered to the workflow actor
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ssh:
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - name: Check out Macrodex
        uses: actions/checkout@v6
        with:
          path: Macrodex

      - name: Select newest stable Xcode
        shell: bash
        run: |
          set -euo pipefail
          latest_xcode="$(python3 - <<'PY'
          import glob, os, re, subprocess
          candidates = []
          for app in glob.glob('/Applications/Xcode*.app'):
              xcodebuild = os.path.join(app, 'Contents/Developer/usr/bin/xcodebuild')
              if not os.path.exists(xcodebuild):
                  continue
              try:
                  output = subprocess.check_output([xcodebuild, '-version'], text=True, stderr=subprocess.DEVNULL)
              except Exception:
                  continue
              match = re.search(r'Xcode\s+(\d+(?:\.\d+)*)', output)
              if match:
                  version = tuple(int(part) for part in match.group(1).split('.'))
                  prerelease = any(term in app.lower() for term in ('beta', 'rc', 'release_candidate'))
                  candidates.append((not prerelease, version, app))
          print(max(candidates)[2] if candidates else '/Applications/Xcode.app')
          PY
          )"
          echo "Selecting Xcode at $latest_xcode"
          sudo xcode-select -s "$latest_xcode/Contents/Developer"
          xcodebuild -version
          xcrun simctl list runtimes available

      - name: Clone SimDeck
        shell: bash
        env:
          SIMDECK_REF: ${{ inputs.simdeck_ref }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${SIMDECK_REF:-main}" https://github.com/NativeScript/SimDeck.git SimDeck
          git -C SimDeck rev-parse --short HEAD

      - name: Prepare newest iPhone simulator
        if: ${{ inputs.prepare_simulator }}
        shell: bash
        run: |
          set -euo pipefail
          ios_udid="$(xcrun simctl list devices available --json | python3 -c '
          import json, re, sys
          data = json.load(sys.stdin)
          choices = []
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              version = tuple(int(part) for part in re.findall(r"\d+", runtime)[:3]) or (0,)
              for index, device in enumerate(devices):
                  if not device.get("isAvailable"):
                      continue
                  name = device.get("name", "")
                  device_type = device.get("deviceTypeIdentifier", "")
                  if "iPhone" not in name and "iPhone" not in device_type:
                      continue
                  preferred = ("Pro", "iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14")
                  rank = sum(term in name for term in preferred)
                  choices.append((version, rank, -index, device["udid"], name, runtime))
          if not choices:
              raise SystemExit("No available iOS iPhone simulator")
          choices.sort(reverse=True)
          _, _, _, udid, name, runtime = choices[0]
          print(f"Selected simulator {name} ({udid}) on {runtime}", file=sys.stderr)
          print(udid)
          ')"
          echo "SIMDECK_DEBUG_UDID=$ios_udid" | tee -a "$GITHUB_ENV"
          xcrun simctl shutdown "$ios_udid" || true
          xcrun simctl boot "$ios_udid" || true
          xcrun simctl bootstatus "$ios_udid" -b
          open -a Simulator --args -CurrentDeviceUDID "$ios_udid" || true
          for attempt in {1..60}; do
            if xcrun simctl io "$ios_udid" screenshot /tmp/simdeck-debug-screen.png >/tmp/simdeck-debug-screenshot.log 2>&1 && [[ -s /tmp/simdeck-debug-screen.png ]]; then
              echo "Screenshot ready on attempt $attempt"
              break
            fi
            sleep 1
          done
          cat /tmp/simdeck-debug-screenshot.log || true

      - name: Build SimDeck
        if: ${{ inputs.build_simdeck }}
        shell: bash
        working-directory: SimDeck
        run: |
          set -euo pipefail
          ./scripts/build-client.sh
          ./scripts/build-cli.sh

      - name: Print debug notes
        shell: bash
        run: |
          set -euo pipefail
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Macrodex: $GITHUB_WORKSPACE/Macrodex"
          echo "SimDeck:  $GITHUB_WORKSPACE/SimDeck"
          echo "UDID:     ${SIMDECK_DEBUG_UDID:-not prepared}"
          echo "Useful commands:"
          echo "  cd $GITHUB_WORKSPACE/SimDeck"
          echo "  ./scripts/build-client.sh && ./scripts/build-cli.sh"
          echo "  ./build/simdeck serve --port 4310 --bind 127.0.0.1 --client-root \"$GITHUB_WORKSPACE/SimDeck/client/dist\" --video-codec h264-software"
          echo "  xcrun simctl io \"${SIMDECK_DEBUG_UDID:-UDID}\" screenshot /tmp/screen.png"

      - name: Open SSH session
        id: tmate
        uses: mxschmitt/action-tmate/detached@v3
        timeout-minutes: 15
        with:
          limit-access-to-actor: ${{ inputs.limit_access_to_actor }}

      - name: Write SSH connection artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmate-info
          {
            echo "ssh-command=${{ steps.tmate.outputs.ssh-command }}"
            echo "ssh-address=${{ steps.tmate.outputs.ssh-address }}"
            echo "web-url=${{ steps.tmate.outputs.web-url }}"
            echo "run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "workspace=$GITHUB_WORKSPACE"
            echo "udid=${SIMDECK_DEBUG_UDID:-}"
          } > tmate-info/session.txt

      - name: Upload SSH connection artifact
        uses: actions/upload-artifact@v4
        with:
          name: simdeck-debug-ssh
          path: tmate-info/session.txt
          retention-days: 1

      - name: Keep runner alive
        shell: bash
        run: |
          echo "tmate session is ready; keeping runner alive until cancelled or timeout."
          sleep 21000
