name: Macrodex
options:
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "202604261725"
    SWIFT_OBJC_BRIDGING_HEADER: Macrodex/Bridge/codex_bridge_objc.h
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
    HEADER_SEARCH_PATHS: "$(inherited)"
    SWIFT_INCLUDE_PATHS: "$(inherited)"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SWIFT_ENABLE_EXPLICIT_MODULES: "YES"
    CLANG_ENABLE_EXPLICIT_MODULES: "YES"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

packages:
  Hairball:
    url: https://github.com/dnakov/hairball.git
    revision: cc97e4074a8981d65414c5610ebbef966fbda01a
  PiJSC:
    path: Packages/PiJSC

targets:
  Macrodex:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: true
    sources:
      - path: Macrodex
        excludes:
          - Resources
          - en.lproj
          - Info.plist
          - Macrodex.entitlements
          - MacrodexDebug.entitlements
      - path: Macrodex/Assets.xcassets
      - path: Macrodex/en.lproj
        buildPhase: resources
      - path: Macrodex/Resources/Themes
        buildPhase: resources
      - path: Macrodex/Resources/FoodIcons
        buildPhase: resources
      - path: Macrodex/Resources/brand_logo.png
        buildPhase: resources
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - sdk: JavaScriptCore.framework
      - sdk: HealthKit.framework
      - package: Hairball
        product: HairballUI
      - package: PiJSC
        product: PiJSC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dj.Macrodex
        INFOPLIST_FILE: Macrodex/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Macrodex/MacrodexDebug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Macrodex/Macrodex.entitlements

schemes:
  Macrodex:
    build:
      targets:
        Macrodex: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
